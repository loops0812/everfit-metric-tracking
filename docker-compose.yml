services:
  app:
    build:
      context: .
      network: host
    ports:
      - 3000:${PORT:-3000}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # depends_on:
    #   - mongo

  mongo-bridge:
    image: cloudflare/cloudflared:latest
    container_name: mongo-bridge
    restart: unless-stopped
    command: access tcp --hostname ${MONGO_HOST:-mongo:27017} --url http://0.0.0.0:27017
    env_file:
      - .env
    ports:
      - '27017:27017'

